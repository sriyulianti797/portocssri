<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edukasi Keamanan Cyber - Facebook Login Simulasi</title>
    <!-- Font Awesome untuk Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div class="background-container">
        <!-- Menggunakan overlay gradient dan gambar dari unsplash sebagai background -->
    </div>

    <div class="login-container">
        <h2>Facebook</h2>
        <form action="#" method="get">
            <div class="input-group">
                <input type="text" placeholder="Username atau Email" required>
                <i class="fas fa-user outline-icon"></i>
            </div>
            
            <div class="input-group">
                <input type="password" placeholder="Password" required>
                <i class="fas fa-lock outline-icon"></i>
            </div>
            
            <div class="options">
                <label>
                    <input type="checkbox"> Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>
            
            <button type="submit">Login</button>
            
            <div class="register">
                <p>Don't have an account? <a href="#">Register</a></p>
            </div>
        </form>
    </div>

    <!-- Footer Peringatan -->
    <div class="warning-footer">
        <i class="fas fa-shield-alt"></i>
        <span><strong>PERINGATAN:</strong> Halaman ini adalah simulasi edukasi keamanan cyber, perhatikan url sebelum memasukan data sensitive.</span>
    </div>
</body>
</html>
